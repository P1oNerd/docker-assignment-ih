version: "3.8"

services:

  # ── PostgreSQL Database ──────────────────────────────────
  postgres:
    image: postgres:15-alpine          # Use official postgres image, no Dockerfile needed
    container_name: notes_db
    environment:
      POSTGRES_DB: notes_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data   # Persist DB data across restarts
    networks:
      - app_network
    restart: unless-stopped

  # ── Node.js Backend ──────────────────────────────────────
  backend:
    build:
      context: ./backend               # Docker will look for Dockerfile inside ./backend
    container_name: notes_backend
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/notes_db
      NODE_ENV: production
      PORT: 3001
    ports:
      - "3001:3001"                    # host:container — expose backend on VM port 3001
    depends_on:
      - postgres                       # Don't start backend until postgres is up
    networks:
      - app_network
    restart: unless-stopped

  # ── React Frontend ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend              # Docker will look for Dockerfile inside ./frontend
    container_name: notes_frontend
    environment:
      REACT_APP_API_URL: http://localhost:3001   # The browser will call this URL
    ports:
      - "3000:80"                      # VM port 3000 maps to nginx's port 80 inside container
    depends_on:
      - backend
    networks:
      - app_network
    restart: unless-stopped

# ── Shared Network ───────────────────────────────────────────
networks:
  app_network:
    driver: bridge                     # Containers on same network can reach each other by name

# ── Named Volume for DB persistence ──────────────────────────
volumes:
  postgres_data:
